<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantOS — Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body><script>if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark-mode');</script>

<div id="login-screen">
  <div class="login-card" style="position:relative;">
    <button id="theme-toggle-login" title="Cambiar tema">🌙</button>
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:32px; margin-bottom:8px;">🍽️</div>
      <h1 style="font-size:26px; color:var(--primary); margin:0 0 4px;">RestaurantOS</h1>
      <p style="font-size:13px; color:var(--text-muted); margin:0;">Sistema de Gestión v1.0 — Línea Base</p>
    </div>

    <div style="margin-bottom:16px;">
      <label class="lbl">Rol de acceso</label>
      <select class="inp" id="login-role">
        <option value="admin">👑 Administrador</option>
        <option value="mesero">🧑‍🍳 Mesero</option>
        <option value="cliente">👤 Cliente</option>
      </select>
    </div>
    <div style="margin-bottom:16px;">
      <label class="lbl">Usuario</label>
      <input class="inp" id="login-user" value="admin@restaurant.com" placeholder="correo@restaurante.com">
    </div>
    <div style="margin-bottom:24px;">
      <label class="lbl">Contraseña</label>
      <input class="inp" type="password" value="••••••••" placeholder="••••••••">
    </div>

    <button class="btn btn-amber w-full" style="width:100%; justify-content:center;" onclick="doLogin()">
      Ingresar al sistema →
    </button>
    <p style="font-size:11px; color:var(--text-muted); text-align:center; margin-top:14px;">
      Módulo: Autenticación de Usuarios — Línea Base v1.0
    </p>
  </div>
</div>

<div id="toast">✓ Acción completada</div>
<script src="script.js"></script>
</body>
</html>
