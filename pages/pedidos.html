<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurantOS — Pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div id="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar">
    <div style="padding:20px 18px 12px;">
      <div style="font-size:18px; font-family:'DM Serif Display',serif; color:var(--primary); margin-bottom:2px;">RestaurantOS</div>
      <div style="font-size:11px; color:var(--text-muted);">v1.0 — Línea Base</div>
    </div>
    <div class="divider" style="margin:0 18px 8px;"></div>

    <div id="user-badge" style="padding:10px 18px; margin-bottom:8px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="avatar" id="user-avatar" style="background:rgba(217,119,6,0.2); color:var(--amber-light);">AD</div>
        <div>
          <div style="font-size:13px; font-weight:500;" id="user-name">Cargando…</div>
          <div style="font-size:11px; color:var(--text-muted);" id="user-role-label"></div>
        </div>
      </div>
    </div>

    <nav id="nav-links" style="flex:1; overflow-y:auto;"></nav>

    <div class="divider" style="margin:8px 18px;"></div>
    <div style="padding:10px 18px 16px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
        <span class="ping"></span>
        <span style="font-size:12px; color:var(--text-muted);">Sistema operativo</span>
      </div>
      <button class="btn btn-ghost btn-sm" style="width:100%; justify-content:center;" onclick="doLogout()">
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main id="main">
    <div class="page-content">

      <!-- Header -->
      <div class="page-header">
        <div>
          <h2>Registro de pedidos</h2>
          <p>Seguimiento en tiempo real</p>
        </div>
        <button class="btn btn-amber" onclick="openPedidoModal()">+ Nuevo pedido</button>
      </div>

      <!-- Status counters -->
      <div class="grid-3" style="margin-bottom:24px;">
        <div class="stat-box" style="text-align:center;">
          <div class="stat-label">En espera</div>
          <div class="stat-val" id="cnt-espera">0</div>
        </div>
        <div class="stat-box" style="text-align:center;">
          <div class="stat-label">En cocina</div>
          <div class="stat-val" id="cnt-cocina">0</div>
        </div>
        <div class="stat-box" style="text-align:center;">
          <div class="stat-label">Entregados</div>
          <div class="stat-val" id="cnt-entregado">0</div>
        </div>
      </div>

      <!-- Kanban board -->
      <div id="orders-board" style="display:flex; gap:16px; width:100%; align-items:flex-start;"></div>

    </div>
  </main>
</div>

<div id="toast">✓ Acción completada</div>
<div id="modal-container"></div>

<script src="../script.js"></script>
<script>
  if (checkAuth()) {
    renderPedidos();
  }
</script>
</body>
</html>
